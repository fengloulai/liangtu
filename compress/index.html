<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片压缩 - 靓图</title>
  <meta name="description" content="在线图片压缩工具，纯浏览器本地处理，不上传服务器。支持JPG/PNG/WebP，拖拽调节质量，实时预览。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%23818cf8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext y='68' x='50' text-anchor='middle' font-size='55'%3E🗜%3C/text%3E%3C/svg%3E">
  <script src="../assets/tracking.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#151515;--bg2:#1a1a1a;--bg3:#222;--border:#333;--text:#e5e5e5;--text2:#9ca3af;--accent:#6366f1;--accent-hover:#818cf8;--radius:8px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100vh}

    header{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#111;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
    header .logo{color:var(--text2);text-decoration:none;font-size:14px}
    header .logo:hover{color:var(--text)}
    header .title{font-weight:600;font-size:15px}
    header .hint{color:var(--text2);font-size:12px;margin-left:auto}

    /* Sub-nav for 电商改图 tools */
    .sub-nav{display:flex;gap:0;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
    .sub-nav a{padding:8px 14px;font-size:12px;color:var(--text2);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
    .sub-nav a:hover{color:var(--text)}
    .sub-nav a.active{color:var(--accent);border-bottom-color:var(--accent)}

    #workspace{display:flex;flex:1;min-height:0}

    /* Left bar */
    #leftBar{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;background:var(--bg2);border-right:1px solid var(--border)}
    .tool-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;border-radius:var(--radius);color:var(--text2);cursor:pointer;transition:all .15s;font-size:18px}
    .tool-btn:hover{background:var(--bg3);color:var(--text)}
    .tool-btn.active{background:var(--accent);color:#fff}
    .tool-divider{width:28px;height:1px;background:var(--border);margin:4px 0}

    /* Center canvas */
    #canvasArea{flex:1;min-width:0;position:relative;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #canvasArea.empty #dropOverlay{display:flex}
    #canvasArea:not(.empty) #dropOverlay{display:none}
    #dropOverlay{flex-direction:column;align-items:center;gap:8px;color:var(--text2);cursor:pointer;padding:40px;border:2px dashed var(--border);border-radius:16px;transition:all .2s;display:none}
    #dropOverlay:hover{border-color:var(--accent);color:var(--text)}
    .drop-icon{font-size:40px}
    .drop-text{font-size:15px}
    .drop-sub{font-size:12px}
    #canvasArea canvas{max-width:100%;max-height:100%;display:none}

    /* Comparison view (original vs compressed) */
    #compareView{display:none;width:100%;height:100%;padding:24px;gap:20px}
    #compareView.show{display:flex;align-items:center;justify-content:center}
    .comp-col{flex:1;max-width:500px;text-align:center}
    .comp-col h3{font-size:13px;color:var(--text2);margin-bottom:10px;font-weight:500}
    .comp-col .img-wrap{background:var(--bg3);border-radius:var(--radius);padding:12px;display:flex;align-items:center;justify-content:center;min-height:200px}
    .comp-col img{max-width:100%;max-height:350px;border-radius:4px}
    .comp-col .info{margin-top:8px;font-size:12px;color:var(--text2)}
    .comp-col .size{color:var(--text);font-weight:600}
    .comp-col .saved{color:#34d399;margin-left:6px}

    /* Right bar */
    #rightBar{width:260px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
    .props-panel{display:none}
    .props-panel.active{display:block}
    .props-panel h3{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:12px}
    .ctrl-row{margin-bottom:12px}
    .ctrl-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
    .ctrl-row input[type=range]{width:100%;accent-color:var(--accent)}
    .ctrl-row select{width:100%;padding:8px 10px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
    .ctrl-row .val{font-size:13px;color:var(--text);font-weight:600;text-align:right;margin-top:2px}
    .btn{display:block;width:100%;padding:10px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;text-align:center;transition:all .15s;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-reset{background:var(--bg3);color:var(--text);border:1px solid var(--border);margin-top:8px}
    .btn-reset:hover{background:var(--border)}

    input[type=file]{display:none}
  </style>
</head>
<body>
<div id="app">
  <header>
    <a href="../" class="logo">← 靓图</a>
    <span class="title">图片压缩</span>
    <span class="hint">本地处理 · 不上传服务器</span>
  </header>

  <div class="sub-nav">
    <a href="./" class="active">🗜 图片压缩</a>
    <a href="../crop/">✂️ 自由裁剪</a>
    <a href="../remove-watermark/">🧹 去除水印</a>
  </div>

  <div id="workspace">
    <!-- 左栏 -->
    <aside id="leftBar">
      <button class="tool-btn active" title="压缩">🗜</button>
      <div class="tool-divider"></div>
      <button class="tool-btn" onclick="resetAll()" title="重新选择">🔄</button>
    </aside>

    <!-- 中栏 -->
    <main id="canvasArea" class="empty">
      <div id="dropOverlay" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">📁</div>
        <div class="drop-text">拖入图片或点击上传</div>
        <div class="drop-sub">JPG / PNG / WebP</div>
      </div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" onchange="handleFile(this.files[0])" hidden>
      <div id="compareView">
        <div class="comp-col">
          <h3>📷 原图</h3>
          <div class="img-wrap"><img id="imgOriginal" alt="原图"></div>
          <div class="info"><span class="size" id="sizeOriginal"></span></div>
        </div>
        <div class="comp-col">
          <h3>🗜 压缩后</h3>
          <div class="img-wrap"><img id="imgCompressed" alt="压缩后"></div>
          <div class="info">
            <span class="size" id="sizeCompressed"></span>
            <span class="saved" id="savedPercent"></span>
          </div>
        </div>
      </div>
    </main>

    <!-- 右栏 -->
    <aside id="rightBar">
      <div class="props-panel active" id="panelCompress">
        <h3>压缩设置</h3>
        <div class="ctrl-row">
          <label>🗜 质量</label>
          <input type="range" id="quality" min="10" max="100" value="75" oninput="onQuality(this.value)">
          <div class="val" id="qualityVal">75%</div>
        </div>
        <div class="ctrl-row">
          <label>格式</label>
          <select id="format" onchange="updateCompress()">
            <option value="image/jpeg">JPG</option>
            <option value="image/png">PNG</option>
            <option value="image/webp">WebP</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="downloadCompressed()" id="btnDownload" style="display:none">⬇ 下载压缩图</button>
        <button class="btn btn-reset" onclick="resetAll()">重新选择</button>
      </div>
    </aside>
  </div>
</div>

<script>
let originalFile = null, originalDataUrl = null, compressedBlob = null;

function handleFile(file) {
  if (!file || !file.type.match(/image\/(jpeg|png|webp)/)) { alert('请上传 JPG/PNG/WebP'); return; }
  if (file.size > 20*1024*1024) { alert('图片最大 20MB'); return; }
  originalFile = file;
  const r = new FileReader();
  r.onload = function(e) {
    originalDataUrl = e.target.result;
    document.getElementById('imgOriginal').src = originalDataUrl;
    document.getElementById('sizeOriginal').textContent = formatSize(file.size);
    document.getElementById('canvasArea').classList.remove('empty');
    document.getElementById('compareView').classList.add('show');
    document.getElementById('btnDownload').style.display = 'block';
    updateCompress();
  };
  r.readAsDataURL(file);
}

function onQuality(v) {
  document.getElementById('qualityVal').textContent = v + '%';
  updateCompress();
}

function updateCompress() {
  if (!originalDataUrl) return;
  const quality = parseInt(document.getElementById('quality').value) / 100;
  const format = document.getElementById('format').value;
  const img = new Image();
  img.onload = function() {
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    c.getContext('2d').drawImage(img, 0, 0);
    c.toBlob(function(blob) {
      compressedBlob = blob;
      const url = URL.createObjectURL(blob);
      document.getElementById('imgCompressed').src = url;
      document.getElementById('sizeCompressed').textContent = formatSize(blob.size);
      const saved = originalFile.size - blob.size;
      const pct = Math.round((saved / originalFile.size) * 100);
      const el = document.getElementById('savedPercent');
      if (pct > 0) { el.textContent = '节省 ' + pct + '%（' + formatSize(saved) + '）'; el.style.color = '#34d399'; }
      else if (pct === 0) { el.textContent = '无变化'; el.style.color = '#9ca3af'; }
      else { el.textContent = '增大 ' + Math.abs(pct) + '%'; el.style.color = '#ef4444'; }
    }, format, quality);
  };
  img.src = originalDataUrl;
}

function downloadCompressed() {
  if (!compressedBlob) return;
  const ext = document.getElementById('format').value.split('/')[1];
  const name = (originalFile.name || 'image').replace(/\.[^.]+$/, '') + '_compressed.' + ext;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(compressedBlob);
  a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function resetAll() {
  originalFile = null; originalDataUrl = null; compressedBlob = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('quality').value = 75;
  document.getElementById('qualityVal').textContent = '75%';
  document.getElementById('format').value = 'image/jpeg';
  document.getElementById('canvasArea').classList.add('empty');
  document.getElementById('compareView').classList.remove('show');
  document.getElementById('btnDownload').style.display = 'none';
  document.getElementById('savedPercent').textContent = '';
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(2) + ' MB';
}

// Drag & drop on canvasArea
const ca = document.getElementById('canvasArea');
ca.addEventListener('dragover', e => { e.preventDefault(); });
ca.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });

// Paste
document.addEventListener('paste', e => {
  for (let item of e.clipboardData.items) {
    if (item.type.match(/image\/(jpeg|png|webp)/)) { handleFile(item.getAsFile()); break; }
  }
});
</script>
</body>
</html>
