<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表情包工具箱 - 靓图</title>
  <link rel="stylesheet" href="style.css">
  <script src="../assets/tracking.js"></script>
</head>
<body>

<div id="app">
  <header>
    <a href="../index.html" class="logo">← 靓图</a>
    <span class="title">表情包工具箱</span>
    <span class="hint">本地处理 · 不上传服务器</span>
  </header>

  <div id="workspace">
    <!-- 左栏：工具 -->
    <aside id="leftBar">
      <button class="tool-btn active" data-tool="crop" title="尺寸">
        <svg width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="2"/><line x1="9" y1="3" x2="9" y2="21" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="text" title="文字">
        <svg width="22" height="22" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="9" y1="20" x2="15" y2="20" stroke="currentColor" stroke-width="2"/><line x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="bg" title="白底">
        <svg width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="tool-divider"></div>
      <button class="tool-btn" data-tool="flip" title="翻转">
        <svg width="22" height="22" viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="9 21 3 21 3 15" fill="none" stroke="currentColor" stroke-width="2"/><line x1="21" y1="3" x2="14" y2="10" stroke="currentColor" stroke-width="2"/><line x1="3" y1="21" x2="10" y2="14" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="filter" title="滤镜">
        <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="adjust" title="调整">
        <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="6" x2="12" y2="18" stroke="currentColor" stroke-width="2"/><polyline points="8 10 12 6 16 10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="watermark" title="水印">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M2 17l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="compress" title="压缩">
        <svg width="22" height="22" viewBox="0 0 24 24"><polyline points="4 14 10 14 10 20" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="20 10 14 10 14 4" fill="none" stroke="currentColor" stroke-width="2"/><line x1="14" y1="10" x2="21" y2="3" stroke="currentColor" stroke-width="2"/><line x1="3" y1="21" x2="10" y2="14" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="tool-divider"></div>
      <button class="tool-btn" onclick="exportImage()" title="导出到电脑">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="7 10 12 15 17 10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="tool-divider"></div>
      <button class="tool-btn" onclick="undo()" title="撤销 Ctrl+Z">
        <svg width="22" height="22" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="tool-btn" onclick="redo()" title="重做 Ctrl+Y">
        <svg width="22" height="22" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="tool-divider"></div>
      <button class="tool-btn" onclick="resetAll()" title="清空">
        <svg width="22" height="22" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </aside>

    <main id="canvasArea" class="empty">
      <div id="dropOverlay">
        <div class="drop-icon">📁</div>
        <div class="drop-text">拖入图片或点击上传</div>
        <div class="drop-sub">JPG / PNG / GIF / WebP</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden>
      <canvas id="mainCanvas"></canvas>
    </main>

    <aside id="rightBar">
      <!-- 图层面板 -->
      <div id="layerPanel" class="layer-panel">
        <div class="layer-header">
          <h3>📚 图层</h3>
          <button class="btn btn-sm" onclick="addTextLayer()" title="添加文字图层">+ 文字</button>
        </div>
        <div id="layerList" class="layer-list">
          <div class="layer-empty">上传图片后<br>图层出现在这里</div>
        </div>
      </div>

      <!-- GIF帧管理 -->
      <div id="framePanel" class="layer-panel">
        <div class="layer-header">
          <h3>🎞️ GIF 帧</h3>
          <button class="btn btn-sm" onclick="addFrame()">保存这一帧</button>
        </div>
        <div id="frameList" class="frame-list">
          <div class="layer-empty">上传图片编辑后<br>点「保存这一帧」<br>每帧内容不同才有动画效果</div>
        </div>
      </div>

      <!-- 尺寸面板 -->
      <div id="panelCrop" class="props-panel active">
        <h3>裁剪尺寸</h3>
        <div class="preset-grid">
          <button class="preset-btn" onclick="doCrop(240,240)">240×240<small>表情</small></button>
          <button class="preset-btn" onclick="doCrop(120,120)">120×120<small>小图</small></button>
          <button class="preset-btn" onclick="doCrop(370,320)">370×320<small>横幅</small></button>
          <button class="preset-btn" onclick="doCrop(750,400)">750×400<small>宽幅</small></button>
        </div>
        <div class="custom-size">
          <input type="number" id="cropW" value="240" min="1" max="4000"> ×
          <input type="number" id="cropH" value="240" min="1" max="4000">
          <button class="btn" onclick="applyCustomCrop()">裁剪</button>
        </div>
      </div>

      <!-- 文字面板 -->
      <div id="panelText" class="props-panel">
        <h3>文字属性</h3>
        <input type="text" id="textInput" placeholder="输入文字后回车..." class="text-input" autocomplete="off">
        <div id="textNoLayer" class="text-hint">选中图层后编辑属性，或输入文字创建新图层</div>
        <div id="textControls" style="display:none">
          <div class="ctrl-row"><label>字体</label><select id="fontFamily" onchange="updateFontFamily(this.value)"><option value="Microsoft YaHei">微软雅黑</option><option value="SimHei">黑体</option><option value="SimSun">宋体</option><option value="KaiTi">楷体</option><option value="FangSong">仿宋</option><option value="YouYuan">幼圆</option><option value="NSimSun">新宋体</option><option value="DengXian">等线</option><option value="LiSu">隶书</option><option value="STXingkai">华文行楷</option><option value="STCaiyun">华文彩云</option><option value="STXinwei">华文新魏</option><option value="STHupo">华文琥珀</option><option value="PingFang SC">苹方</option></select></div>
          <div class="ctrl-row"><label>字号 <span id="fontSizeVal">24px</span></label><input type="range" id="fontSizeSlider" min="12" max="200" value="24" oninput="updateFontSize(this.value);document.getElementById('fontSizeVal').textContent=this.value+'px'"></div>
          <div class="ctrl-row"><label>文字颜色</label><input type="color" id="textColor" value="#FFFFFF" oninput="updateTextColor(this.value)"></div>
          <div class="ctrl-row"><label>描边颜色</label><input type="color" id="strokeColor" value="#000000" oninput="updateStrokeColor(this.value)"></div>
          <div class="ctrl-row"><label>描边宽度 <span id="strokeWidthVal">2px</span></label><input type="range" id="strokeWidthSlider" min="0" max="20" value="2" oninput="updateStrokeWidth(this.value);document.getElementById('strokeWidthVal').textContent=this.value+'px'"></div>
          <div class="ctrl-row"><label>旋转角度 <span id="rotationVal">0°</span></label><input type="range" id="rotationSlider" min="-180" max="180" value="0" oninput="updateRotation(this.value);document.getElementById('rotationVal').textContent=this.value+'°'"></div>
          <div style="margin-top:8px;display:flex;gap:6px"><button class="btn btn-sm danger" onclick="deleteActiveLayer()">🗑 删除图层</button></div>
        </div>
      </div>

      <div id="panelBg" class="props-panel"><h3>白底处理</h3><button class="btn block" onclick="applyWhiteBg()">杂底→纯白底</button><button class="btn block" onclick="applyTransparentToWhite()">透明→白底</button></div>
      <div id="panelFlip" class="props-panel"><h3>翻转/旋转</h3><button class="btn block" onclick="flipH()">↔ 水平翻转</button><button class="btn block" onclick="flipV()">↕ 垂直翻转</button><button class="btn block" onclick="rotateCW()">↻ 右转90°</button><button class="btn block" onclick="rotateCCW()">↺ 左转90°</button></div>
      <div id="panelFilter" class="props-panel"><h3>滤镜</h3><button class="btn block" onclick="applyFilter('grayscale')">◼ 灰度</button><button class="btn block" onclick="applyFilter('sepia')">🟫 复古</button><button class="btn block" onclick="applyFilter('invert')">🔄 反色</button><div class="ctrl-row"><label>模糊 <span id="blurVal">0px</span></label><input type="range" min="0" max="10" value="0" step="0.5" oninput="applyBlur(this.value);document.getElementById('blurVal').textContent=this.value+'px'"></div><button class="btn block" onclick="applyFilter('none')" style="margin-top:8px">↩ 重置</button></div>
      <div id="panelAdjust" class="props-panel"><h3>亮度/对比度/饱和度</h3><div class="ctrl-row"><label>亮度 <span id="brightVal">100%</span></label><input type="range" id="brightSlider" min="0" max="200" value="100" oninput="adjustBrightness();document.getElementById('brightVal').textContent=this.value+'%'"></div><div class="ctrl-row"><label>对比度 <span id="contrastVal">100%</span></label><input type="range" id="contrastSlider" min="0" max="200" value="100" oninput="adjustContrast();document.getElementById('contrastVal').textContent=this.value+'%'"></div><div class="ctrl-row"><label>饱和度 <span id="saturateVal">100%</span></label><input type="range" id="saturateSlider" min="0" max="200" value="100" oninput="adjustSaturation();document.getElementById('saturateVal').textContent=this.value+'%'"></div><button class="btn block" onclick="resetAdjust()" style="margin-top:8px">↩ 重置</button></div>
      <div id="panelWatermark" class="props-panel"><h3>文字水印</h3><input type="text" id="watermarkText" placeholder="水印文字..." class="text-input" oninput="previewWatermark()"><div class="ctrl-row"><label>位置</label><select id="watermarkPos" onchange="previewWatermark()"><option value="br">右下角</option><option value="bl">左下角</option><option value="center">居中</option><option value="tile">平铺</option></select></div><div class="ctrl-row"><label>透明度 <span id="wmOpacityVal">30%</span></label><input type="range" id="wmOpacity" min="5" max="80" value="30" oninput="previewWatermark();document.getElementById('wmOpacityVal').textContent=this.value+'%'"></div><button class="btn primary block" onclick="applyWatermark()" style="margin-top:8px">✅ 应用水印</button><button class="btn block" onclick="removeWatermark()">🗑 清除水印</button></div>
      <div id="panelCompress" class="props-panel"><h3>图片压缩</h3><div class="ctrl-row"><label>质量 <span id="qualityVal">80%</span></label><input type="range" id="qualitySlider" min="10" max="100" value="80" oninput="document.getElementById('qualityVal').textContent=this.value+'%'"></div><div class="export-info" id="compressInfo">选择质量后下载</div><button class="btn primary block" onclick="compressExport()" style="margin-top:8px">🗜 下载压缩版</button></div>

      <div class="export-section">
        <div id="panelExport"><h3>导出到电脑</h3>
        <button class="btn primary block" onclick="exportGIF()" id="btnExportGIF" style="margin-bottom:6px;display:none">🎞️ 导出 GIF 动画</button>
        <button class="btn primary block" onclick="exportForWechat()" style="margin-bottom:6px">🟢 微信表情导出 (240×240 PNG ≤500KB)</button>
        <div class="export-row"><select id="exportFormat"><option value="image/png">PNG</option><option value="image/jpeg">JPEG</option><option value="image/webp">WebP</option></select><button class="btn primary" onclick="exportImage()">下载</button></div><div class="export-info" id="exportInfo">-</div></div>
      </div>
    </aside>
  </div>
</div>

<!-- 导出后弹窗 -->
<div id="feedbackModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3>💬 留个言吧</h3>
      <button class="modal-close" onclick="closeFeedbackModal()">✕</button>
    </div>
    <p style="font-size:0.85em;color:#888;margin-bottom:10px">下载完成！有什么想说的？不写也没关系～</p>
    <textarea id="fbMsg" placeholder="bug反馈、功能建议、随便唠..." maxlength="500" rows="3"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
      <button class="btn" onclick="closeFeedbackModal()">不了谢谢</button>
      <button class="btn primary" onclick="submitFeedback()">发送留言</button>
    </div>
  </div>
</div>

<script src="gif.js"></script>
<script src="app.js"></script>
</body>
</html>
