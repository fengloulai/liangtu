<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自由裁剪 - 靓图</title>
  <meta name="description" content="在线图片裁剪工具，拖拽框选自由裁剪，支持1:1/4:3/16:9比例锁定，纯浏览器本地处理。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%23818cf8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext y='68' x='50' text-anchor='middle' font-size='55'%3E✂%3C/text%3E%3C/svg%3E">
  <script src="../assets/tracking.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#151515;--bg2:#1a1a1a;--bg3:#222;--border:#333;--text:#e5e5e5;--text2:#9ca3af;--accent:#6366f1;--accent-hover:#818cf8;--radius:8px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100vh}

    header{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#111;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
    header .logo{color:var(--text2);text-decoration:none;font-size:14px}
    header .logo:hover{color:var(--text)}
    header .title{font-weight:600;font-size:15px}
    header .hint{color:var(--text2);font-size:12px;margin-left:auto}

    .sub-nav{display:flex;gap:0;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
    .sub-nav a{padding:8px 14px;font-size:12px;color:var(--text2);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
    .sub-nav a:hover{color:var(--text)}
    .sub-nav a.active{color:var(--accent);border-bottom-color:var(--accent)}

    #workspace{display:flex;flex:1;min-height:0}

    #leftBar{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;background:var(--bg2);border-right:1px solid var(--border)}
    .tool-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;border-radius:var(--radius);color:var(--text2);cursor:pointer;transition:all .15s;font-size:13px;font-weight:600}
    .tool-btn:hover{background:var(--bg3);color:var(--text)}
    .tool-btn.active{background:var(--accent);color:#fff}
    .tool-divider{width:28px;height:1px;background:var(--border);margin:4px 0}

    #canvasArea{flex:1;min-width:0;position:relative;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #canvasArea.empty #dropOverlay{display:flex}
    #canvasArea:not(.empty) #dropOverlay{display:none}
    #dropOverlay{flex-direction:column;align-items:center;gap:8px;color:var(--text2);cursor:pointer;padding:40px;border:2px dashed var(--border);border-radius:16px;transition:all .2s;display:none}
    #dropOverlay:hover{border-color:var(--accent);color:var(--text)}
    .drop-icon{font-size:40px}
    .drop-text{font-size:15px}
    .drop-sub{font-size:12px}
    #canvasArea canvas{max-width:100%;max-height:100%;cursor:crosshair;display:none}
    #canvasArea:not(.empty) canvas{display:block}

    #rightBar{width:240px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
    .props-panel{display:none}
    .props-panel.active{display:block}
    .props-panel h3{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:12px}
    .info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)}
    .info-row .val{color:var(--text);font-weight:600}
    .btn{display:block;width:100%;padding:10px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;text-align:center;transition:all .15s;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-reset{background:var(--bg3);color:var(--text);border:1px solid var(--border);margin-top:8px}
    .btn-reset:hover{background:var(--border)}

    input[type=file]{display:none}
  </style>
</head>
<body>
<div id="app">
  <header>
    <a href="../" class="logo">← 靓图</a>
    <span class="title">自由裁剪</span>
    <span class="hint">本地处理 · 不上传服务器</span>
  </header>

  <div class="sub-nav">
    <a href="../compress/">🗜 图片压缩</a>
    <a href="./" class="active">✂️ 自由裁剪</a>
    <a href="../remove-watermark/">🧹 去除水印</a>
  </div>

  <div id="workspace">
    <!-- 左栏 -->
    <aside id="leftBar">
      <button class="tool-btn active" data-ratio="free" onclick="setRatio('free',this)" title="自由">自由</button>
      <button class="tool-btn" data-ratio="1:1" onclick="setRatio('1:1',this)" title="1:1">1:1</button>
      <button class="tool-btn" data-ratio="4:3" onclick="setRatio('4:3',this)" title="4:3">4:3</button>
      <button class="tool-btn" data-ratio="16:9" onclick="setRatio('16:9',this)" title="16:9">16:9</button>
      <button class="tool-btn" data-ratio="3:4" onclick="setRatio('3:4',this)" title="3:4">3:4</button>
      <button class="tool-btn" data-ratio="9:16" onclick="setRatio('9:16',this)" title="9:16">9:16</button>
      <div class="tool-divider"></div>
      <button class="tool-btn" onclick="resetAll()" title="重新选择">🔄</button>
    </aside>

    <!-- 中栏 -->
    <main id="canvasArea" class="empty">
      <div id="dropOverlay" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">📁</div>
        <div class="drop-text">拖入图片或点击上传</div>
        <div class="drop-sub">JPG / PNG / WebP</div>
      </div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" onchange="handleFile(this.files[0])" hidden>
      <canvas id="canvas"></canvas>
    </main>

    <!-- 右栏 -->
    <aside id="rightBar">
      <div class="props-panel" id="panelInfo">
        <h3>裁剪信息</h3>
        <div class="info-row"><span>选区位置</span><span class="val" id="infoPos">-</span></div>
        <div class="info-row"><span>选区尺寸</span><span class="val" id="infoSize">-</span></div>
        <div class="info-row"><span>比例</span><span class="val" id="infoRatio">自由</span></div>
        <button class="btn btn-primary" onclick="doCrop()" id="btnCrop" style="display:none;margin-top:16px">✂️ 裁剪并下载</button>
        <button class="btn btn-reset" onclick="resetAll()">重新选择</button>
      </div>
    </aside>
  </div>
</div>

<script>
let img = null, imgW = 0, imgH = 0;
let displayW = 0, displayH = 0, scale = 1;
let cropRect = null, lockedRatio = null;
let dragging = false, dragStart = null;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function handleFile(file) {
  if (!file || !file.type.match(/image\/(jpeg|png|webp)/)) { alert('请上传 JPG/PNG/WebP'); return; }
  if (file.size > 20*1024*1024) { alert('图片最大 20MB'); return; }
  const r = new FileReader();
  r.onload = function(e) {
    img = new Image();
    img.onload = initCanvas;
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

function initCanvas() {
  const area = document.getElementById('canvasArea');
  const maxW = area.clientWidth - 40;
  const maxH = area.clientHeight - 40;
  scale = Math.min(maxW / img.width, maxH / img.height, 1);
  displayW = Math.round(img.width * scale);
  displayH = Math.round(img.height * scale);
  canvas.width = displayW;
  canvas.height = displayH;

  cropRect = {
    x: Math.round(displayW * 0.1), y: Math.round(displayH * 0.1),
    w: Math.round(displayW * 0.8), h: Math.round(displayH * 0.8)
  };

  document.getElementById('canvasArea').classList.remove('empty');
  document.getElementById('panelInfo').classList.add('active');
  document.getElementById('btnCrop').style.display = 'block';
  updateInfo();
  draw();
}

function draw() {
  ctx.clearRect(0, 0, displayW, displayH);
  ctx.drawImage(img, 0, 0, displayW, displayH);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, displayW, displayH);
  ctx.clearRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
  ctx.drawImage(img, cropRect.x/scale, cropRect.y/scale, cropRect.w/scale, cropRect.h/scale, cropRect.x, cropRect.y, cropRect.w, cropRect.h);
  // Border
  ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 2;
  ctx.setLineDash([6,3]); ctx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h); ctx.setLineDash([]);
  // Thirds
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.5;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(cropRect.x + cropRect.w*i/3, cropRect.y); ctx.lineTo(cropRect.x + cropRect.w*i/3, cropRect.y+cropRect.h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cropRect.x, cropRect.y + cropRect.h*i/3); ctx.lineTo(cropRect.x+cropRect.w, cropRect.y+cropRect.h*i/3); ctx.stroke();
  }
  // Handles
  const sz = 8;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 1.5;
  [[cropRect.x,cropRect.y],[cropRect.x+cropRect.w,cropRect.y],[cropRect.x,cropRect.y+cropRect.h],[cropRect.x+cropRect.w,cropRect.y+cropRect.h]].forEach(([cx,cy]) => {
    ctx.fillRect(cx-sz/2, cy-sz/2, sz, sz); ctx.strokeRect(cx-sz/2, cy-sz/2, sz, sz);
  });
}

function updateInfo() {
  const rx = Math.round(cropRect.x/scale), ry = Math.round(cropRect.y/scale);
  const rw = Math.round(cropRect.w/scale), rh = Math.round(cropRect.h/scale);
  document.getElementById('infoPos').textContent = rx + ', ' + ry;
  document.getElementById('infoSize').textContent = rw + ' × ' + rh + ' px';
}

function setRatio(ratio, btn) {
  document.querySelectorAll('#leftBar .tool-btn[data-ratio]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (ratio === 'free') { lockedRatio = null; document.getElementById('infoRatio').textContent = '自由'; return; }
  const [w, h] = ratio.split(':').map(Number);
  lockedRatio = w / h;
  document.getElementById('infoRatio').textContent = ratio;
  if (cropRect) {
    cropRect.h = Math.round(cropRect.w / lockedRatio);
    if (cropRect.y + cropRect.h > displayH) { cropRect.h = displayH - cropRect.y; cropRect.w = Math.round(cropRect.h * lockedRatio); }
    draw(); updateInfo();
  }
}

function getPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)); }

canvas.addEventListener('mousedown', e => {
  const pos = getPos(e);
  const sz = 12;
  const corners = [
    {cx:cropRect.x, cy:cropRect.y, h:'nw'},{cx:cropRect.x+cropRect.w, cy:cropRect.y, h:'ne'},
    {cx:cropRect.x, cy:cropRect.y+cropRect.h, h:'sw'},{cx:cropRect.x+cropRect.w, cy:cropRect.y+cropRect.h, h:'se'}
  ];
  for (const c of corners) {
    if (Math.abs(pos.x-c.cx)<sz && Math.abs(pos.y-c.cy)<sz) { dragging=true; dragStart={...pos, handle:c.h, origRect:{...cropRect}}; return; }
  }
  if (pos.x>=cropRect.x && pos.x<=cropRect.x+cropRect.w && pos.y>=cropRect.y && pos.y<=cropRect.y+cropRect.h) {
    dragging=true; dragStart={...pos, handle:'move', origRect:{...cropRect}}; return;
  }
  dragging=true; dragStart={...pos, handle:'new', origRect:{...cropRect}};
});

canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  const pos = getPos(e);
  const dx = pos.x - dragStart.x, dy = pos.y - dragStart.y;
  const r = dragStart.origRect;
  if (dragStart.handle === 'move') {
    cropRect.x = clamp(r.x+dx, 0, displayW-cropRect.w);
    cropRect.y = clamp(r.y+dy, 0, displayH-cropRect.h);
  } else if (dragStart.handle === 'new') {
    let x=Math.min(dragStart.x,pos.x), y=Math.min(dragStart.y,pos.y), w=Math.abs(dx), h=Math.abs(dy);
    if (lockedRatio) { if (w/h > lockedRatio) w = h*lockedRatio; else h = w/lockedRatio; }
    cropRect = {x:clamp(x,0,displayW-w), y:clamp(y,0,displayH-h), w, h};
  } else {
    let nx=r.x, ny=r.y, nw=r.w, nh=r.h;
    if (dragStart.handle.includes('e')) nw=r.w+dx;
    if (dragStart.handle.includes('w')) { nx=r.x+dx; nw=r.w-dx; }
    if (dragStart.handle.includes('s')) nh=r.h+dy;
    if (dragStart.handle.includes('n')) { ny=r.y+dy; nh=r.h-dy; }
    if (lockedRatio) { nh=nw/lockedRatio; if (dragStart.handle.includes('n')) ny=r.y+r.h-nh; }
    nw=Math.max(20,nw); nh=Math.max(20,nh);
    if (nx<0){nw+=nx;nx=0;} if (ny<0){nh+=ny;ny=0;}
    if (nx+nw>displayW) nw=displayW-nx;
    if (ny+nh>displayH) nh=displayH-ny;
    cropRect={x:nx,y:ny,w:nw,h:nh};
  }
  updateInfo(); draw();
});

canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });

// Touch
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); });

function doCrop() {
  const sx = Math.round(cropRect.x/scale), sy = Math.round(cropRect.y/scale);
  const sw = Math.round(cropRect.w/scale), sh = Math.round(cropRect.h/scale);
  const out = document.createElement('canvas');
  out.width=sw; out.height=sh;
  out.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
  out.toBlob(function(blob) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'cropped.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }, 'image/png');
}

function resetAll() {
  img = null; cropRect = null; lockedRatio = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('canvasArea').classList.add('empty');
  document.getElementById('panelInfo').classList.remove('active');
  document.getElementById('btnCrop').style.display = 'none';
  document.querySelectorAll('#leftBar .tool-btn[data-ratio]').forEach((b,i) => { if(i===0)b.classList.add('active'); else b.classList.remove('active'); });
}

const ca = document.getElementById('canvasArea');
ca.addEventListener('dragover', e => { e.preventDefault(); });
ca.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
document.addEventListener('paste', e => {
  for (let item of e.clipboardData.items) {
    if (item.type.match(/image\/(jpeg|png|webp)/)) { handleFile(item.getAsFile()); break; }
  }
});
</script>
</body>
</html>
