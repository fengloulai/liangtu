<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去除水印 - 靓图</title>
  <meta name="description" content="在线去水印工具，框选水印区域，高斯模糊智能去除，纯浏览器本地处理，不上传服务器。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%23818cf8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext y='68' x='50' text-anchor='middle' font-size='55'%3E🧹%3C/text%3E%3C/svg%3E">
  <script src="../assets/tracking.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#151515;--bg2:#1a1a1a;--bg3:#222;--border:#333;--text:#e5e5e5;--text2:#9ca3af;--accent:#6366f1;--accent-hover:#818cf8;--radius:8px;--danger:#ef4444}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100vh}

    header{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#111;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
    header .logo{color:var(--text2);text-decoration:none;font-size:14px}
    header .logo:hover{color:var(--text)}
    header .title{font-weight:600;font-size:15px}
    header .hint{color:var(--text2);font-size:12px;margin-left:auto}

    .sub-nav{display:flex;gap:0;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
    .sub-nav a{padding:8px 14px;font-size:12px;color:var(--text2);text-decoration:none;border-bottom:2px solid transparent;transition:all .15s}
    .sub-nav a:hover{color:var(--text)}
    .sub-nav a.active{color:var(--accent);border-bottom-color:var(--accent)}

    #workspace{display:flex;flex:1;min-height:0}

    #leftBar{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;background:var(--bg2);border-right:1px solid var(--border)}
    .tool-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;border-radius:var(--radius);color:var(--text2);cursor:pointer;transition:all .15s;font-size:16px}
    .tool-btn:hover{background:var(--bg3);color:var(--text)}
    .tool-btn.active{background:var(--accent);color:#fff}
    .tool-divider{width:28px;height:1px;background:var(--border);margin:4px 0}

    #canvasArea{flex:1;min-width:0;position:relative;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #canvasArea.empty #dropOverlay{display:flex}
    #canvasArea:not(.empty) #dropOverlay{display:none}
    #dropOverlay{flex-direction:column;align-items:center;gap:8px;color:var(--text2);cursor:pointer;padding:40px;border:2px dashed var(--border);border-radius:16px;transition:all .2s;display:none}
    #dropOverlay:hover{border-color:var(--accent);color:var(--text)}
    .drop-icon{font-size:40px}
    .drop-text{font-size:15px}
    .drop-sub{font-size:12px}
    #canvasArea canvas{max-width:100%;max-height:100%;cursor:crosshair;display:none}
    #canvasArea:not(.empty) canvas{display:block}
    #canvasArea.result canvas{display:none}
    .canvas-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--text2);background:rgba(0,0,0,0.7);padding:6px 14px;border-radius:20px;pointer-events:none}

    /* Comparison view */
    #compareView{display:none;width:100%;height:100%;padding:24px;gap:20px}
    #canvasArea.result #compareView{display:flex;align-items:center;justify-content:center}
    #canvasArea.result #dropOverlay{display:none}
    #canvasArea.result .canvas-hint{display:none}
    .comp-col{flex:1;max-width:500px;text-align:center}
    .comp-col h3{font-size:13px;color:var(--text2);margin-bottom:10px;font-weight:500}
    .comp-col .img-wrap{background:var(--bg3);border-radius:var(--radius);padding:12px;display:flex;align-items:center;justify-content:center;min-height:200px}
    .comp-col img{max-width:100%;max-height:350px;border-radius:4px}

    #rightBar{width:240px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
    .props-panel h3{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:10px}
    .mark-list{max-height:160px;overflow-y:auto}
    .mark-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg3);border-radius:6px;margin-bottom:4px;font-size:12px}
    .mark-item .pos{color:var(--text2)}
    .mark-item .del{color:var(--danger);cursor:pointer;font-size:14px;padding:0 4px}
    .mark-item .del:hover{color:#f87171}
    .mark-empty{font-size:12px;color:var(--text2);text-align:center;padding:20px 0}
    .ctrl-row{margin-bottom:12px}
    .ctrl-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
    .ctrl-row input[type=range]{width:100%;accent-color:var(--accent)}
    .ctrl-row .val{font-size:12px;color:var(--text);text-align:right;margin-top:2px}
    .btn{display:block;width:100%;padding:10px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;text-align:center;transition:all .15s;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
    .btn-outline{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
    .btn-outline:hover{background:var(--border)}
    .btn-danger{background:var(--bg3);color:var(--danger);border:1px solid var(--border)}
    .btn-danger:hover{background:#2a1a1a}

    input[type=file]{display:none}
  </style>
</head>
<body>
<div id="app">
  <header>
    <a href="../" class="logo">← 靓图</a>
    <span class="title">去除水印</span>
    <span class="hint">本地处理 · 不上传服务器</span>
  </header>

  <div class="sub-nav">
    <a href="../compress/">🗜 图片压缩</a>
    <a href="../crop/">✂️ 自由裁剪</a>
    <a href="./" class="active">🧹 去除水印</a>
  </div>

  <div id="workspace">
    <aside id="leftBar">
      <button class="tool-btn active" title="框选水印">🔲</button>
      <div class="tool-divider"></div>
      <button class="tool-btn" onclick="undoLast()" title="撤销框选" id="btnUndo" style="display:none">↩</button>
      <button class="tool-btn" onclick="clearMarks()" title="清除全部" id="btnClear" style="display:none">🗑</button>
      <div class="tool-divider"></div>
      <button class="tool-btn" onclick="resetAll()" title="重新选择">🔄</button>
    </aside>

    <main id="canvasArea" class="empty">
      <div id="dropOverlay" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">📁</div>
        <div class="drop-text">拖入图片或点击上传</div>
        <div class="drop-sub">JPG / PNG / WebP</div>
      </div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" onchange="handleFile(this.files[0])" hidden>
      <canvas id="canvas"></canvas>
      <div class="canvas-hint" id="canvasHint">🖱️ 在水印区域拖拽框选，可框多个</div>

      <div id="compareView">
        <div class="comp-col">
          <h3>📷 原图</h3>
          <div class="img-wrap"><img id="imgOriginal" alt="原图"></div>
        </div>
        <div class="comp-col">
          <h3>🧹 去水印后</h3>
          <div class="img-wrap"><img id="imgResult" alt="结果"></div>
        </div>
      </div>
    </main>

    <aside id="rightBar">
      <div class="props-panel">
        <h3>水印标记</h3>
        <div class="mark-list" id="markList">
          <div class="mark-empty">上传图片后<br>拖拽框选水印区域</div>
        </div>
        <button class="btn btn-danger" onclick="undoLast()" id="btnUndoR" style="display:none">↩ 撤销框选</button>
      </div>
      <div class="props-panel" id="blurPanel" style="display:none">
        <h3>模糊强度</h3>
        <div class="ctrl-row">
          <label>🔮 半径</label>
          <input type="range" id="blurRadius" min="2" max="20" value="8" oninput="document.getElementById('blurVal').textContent=this.value+'px'">
          <div class="val" id="blurVal">8px</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="removeWatermarks()" id="btnRemove" style="display:none">🧹 去除水印</button>
      <button class="btn btn-outline" onclick="goBack()" id="btnBack" style="display:none">← 返回编辑</button>
      <button class="btn btn-outline" onclick="downloadResult()" id="btnDownload" style="display:none">⬇ 下载</button>
      <button class="btn btn-outline" onclick="resetAll()" style="margin-top:8px">重新选择</button>
    </aside>
  </div>
</div>

<script>
let img = null, imgW = 0, imgH = 0;
let displayW = 0, displayH = 0, scale = 1;
let marks = [];
let dragging = false, dragStart = null;
let resultDataUrl = null;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function handleFile(file) {
  if (!file || !file.type.match(/image\/(jpeg|png|webp)/)) { alert('请上传 JPG/PNG/WebP'); return; }
  if (file.size > 20*1024*1024) { alert('图片最大 20MB'); return; }
  const r = new FileReader();
  r.onload = function(e) {
    img = new Image();
    img.onload = initCanvas;
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

function initCanvas() {
  const area = document.getElementById('canvasArea');
  const maxW = area.clientWidth - 40;
  const maxH = area.clientHeight - 40;
  scale = Math.min(maxW / img.width, maxH / img.height, 1);
  displayW = Math.round(img.width * scale);
  displayH = Math.round(img.height * scale);
  canvas.width = displayW;
  canvas.height = displayH;
  marks = [];
  resultDataUrl = null;

  document.getElementById('canvasArea').classList.remove('empty', 'result');
  document.getElementById('canvasHint').style.display = 'block';
  document.getElementById('btnRemove').style.display = 'none';
  document.getElementById('btnBack').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';
  document.getElementById('blurPanel').style.display = 'none';
  refreshMarkList();
  draw();
}

function draw() {
  ctx.clearRect(0, 0, displayW, displayH);
  ctx.drawImage(img, 0, 0, displayW, displayH);
  marks.forEach(m => {
    ctx.fillStyle = 'rgba(239,68,68,0.2)';
    ctx.fillRect(m.x, m.y, m.w, m.h);
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
    ctx.setLineDash([5,3]); ctx.strokeRect(m.x, m.y, m.w, m.h); ctx.setLineDash([]);
  });
  if (dragging && dragStart) {
    const r = getDragRect();
    ctx.fillStyle = 'rgba(239,68,68,0.1)';
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
    ctx.setLineDash([5,3]);
    ctx.fillRect(r.x, r.y, r.w, r.h); ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.setLineDash([]);
  }
}

function getDragRect() {
  const x = Math.min(dragStart.x, dragStart.curX), y = Math.min(dragStart.y, dragStart.curY);
  return { x, y, w: Math.abs(dragStart.curX - dragStart.x), h: Math.abs(dragStart.curY - dragStart.y) };
}

function refreshMarkList() {
  const list = document.getElementById('markList');
  if (!marks.length) {
    list.innerHTML = '<div class="mark-empty">上传图片后<br>拖拽框选水印区域</div>';
    document.getElementById('btnUndo').style.display = 'none';
    document.getElementById('btnClear').style.display = 'none';
    document.getElementById('btnUndoR').style.display = 'none';
    document.getElementById('btnRemove').style.display = 'none';
    document.getElementById('blurPanel').style.display = 'none';
  } else {
    list.innerHTML = marks.map((m,i) => 
      '<div class="mark-item"><span class="pos">区域 '+(i+1)+': '+Math.round(m.w/scale)+'×'+Math.round(m.h/scale)+'px</span><span class="del" onclick="delMark('+i+')">✕</span></div>'
    ).join('');
    document.getElementById('btnUndo').style.display = '';
    document.getElementById('btnClear').style.display = '';
    document.getElementById('btnUndoR').style.display = '';
    document.getElementById('btnRemove').style.display = 'block';
    document.getElementById('blurPanel').style.display = 'block';
  }
}

function delMark(i) { marks.splice(i,1); refreshMarkList(); draw(); }
function undoLast() { marks.pop(); refreshMarkList(); draw(); }
function clearMarks() { marks = []; refreshMarkList(); draw(); }

function getPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

canvas.addEventListener('mousedown', e => {
  const pos = getPos(e);
  dragStart = { x: pos.x, y: pos.y, curX: pos.x, curY: pos.y };
  dragging = true;
});
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  const pos = getPos(e);
  dragStart.curX = pos.x; dragStart.curY = pos.y;
  draw();
});
canvas.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  const r = getDragRect();
  if (r.w >= 10 && r.h >= 10) { marks.push({ x: r.x, y: r.y, w: r.w, h: r.h }); refreshMarkList(); }
  dragStart = null;
  draw();
});

canvas.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY})); });
canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); });

// ---- Gaussian blur ----
function gaussBlur(imageData, radius) {
  const w = imageData.width, h = imageData.height;
  const src = new Float32Array(w * h * 4);
  // Copy Uint8→Float32
  for (let i = 0; i < src.length; i++) src[i] = imageData.data[i];
  const tmp = new Float32Array(w * h * 4);
  const dst = new Float32Array(w * h * 4);
  
  // Build kernel
  const sigma = Math.max(radius / 2, 0.5);
  const kernelSize = Math.max(3, Math.floor(radius * 2 + 1));
  const half = Math.floor(kernelSize / 2);
  const kernel = new Float32Array(kernelSize);
  let sum = 0;
  for (let i = 0; i < kernelSize; i++) {
    const x = i - half;
    kernel[i] = Math.exp(-(x * x) / (2 * sigma * sigma));
    sum += kernel[i];
  }
  for (let i = 0; i < kernelSize; i++) kernel[i] /= sum;

  // Horizontal pass
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r = 0, g = 0, b = 0, a = 0;
      for (let k = 0; k < kernelSize; k++) {
        const sx = Math.min(Math.max(x + k - half, 0), w - 1);
        const idx = (y * w + sx) * 4;
        const weight = kernel[k];
        r += src[idx] * weight;
        g += src[idx + 1] * weight;
        b += src[idx + 2] * weight;
        a += src[idx + 3] * weight;
      }
      const idx = (y * w + x) * 4;
      tmp[idx] = r; tmp[idx + 1] = g; tmp[idx + 2] = b; tmp[idx + 3] = a;
    }
  }

  // Vertical pass
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r = 0, g = 0, b = 0, a = 0;
      for (let k = 0; k < kernelSize; k++) {
        const sy = Math.min(Math.max(y + k - half, 0), h - 1);
        const idx = (sy * w + x) * 4;
        const weight = kernel[k];
        r += tmp[idx] * weight;
        g += tmp[idx + 1] * weight;
        b += tmp[idx + 2] * weight;
        a += tmp[idx + 3] * weight;
      }
      const idx = (y * w + x) * 4;
      dst[idx] = r; dst[idx + 1] = g; dst[idx + 2] = b; dst[idx + 3] = a;
    }
  }

  // Convert back to Uint8ClampedArray
  const outData = new Uint8ClampedArray(w * h * 4);
  for (let i = 0; i < dst.length; i++) outData[i] = Math.min(255, Math.max(0, Math.round(dst[i])));
  return new ImageData(outData, w, h);
}

function removeWatermarks() {
  if (!marks.length) { alert('请先框选水印区域'); return; }
  const btn = document.getElementById('btnRemove');
  btn.disabled = true; btn.textContent = '处理中...';
  const blurRadius = parseInt(document.getElementById('blurRadius').value) || 8;

  requestAnimationFrame(() => {
    const out = document.createElement('canvas');
    out.width = img.width; out.height = img.height;
    const octx = out.getContext('2d');
    octx.drawImage(img, 0, 0);

    marks.forEach(m => {
      const sx = Math.round(m.x / scale), sy = Math.round(m.y / scale);
      const sw = Math.round(m.w / scale), sh = Math.round(m.h / scale);
      
      // Get slightly larger region for smooth edge blending (feather border)
      const feather = Math.min(blurRadius, 4);
      const rx = Math.max(0, sx - feather);
      const ry = Math.max(0, sy - feather);
      const rw = Math.min(img.width - rx, sw + feather * 2);
      const rh = Math.min(img.height - ry, sh + feather * 2);
      
      // Extract region
      const regionData = octx.getImageData(rx, ry, rw, rh);
      
      // Apply blur scaled to image size
      const scaledRadius = blurRadius * scale;
      const blurred = gaussBlur(regionData, scaledRadius);
      octx.putImageData(blurred, rx, ry);
    });

    // Save original canvas as "before"
    const origUrl = canvas.toDataURL();
    resultDataUrl = out.toDataURL('image/png');

    // Show comparison
    document.getElementById('imgOriginal').src = origUrl;
    document.getElementById('imgResult').src = resultDataUrl;
    document.getElementById('canvasArea').classList.add('result');
    document.getElementById('btnRemove').style.display = 'none';
    document.getElementById('btnBack').style.display = 'block';
    document.getElementById('btnDownload').style.display = 'block';
    document.getElementById('btnUndo').style.display = 'none';
    document.getElementById('btnClear').style.display = 'none';
    document.getElementById('btnUndoR').style.display = 'none';

    // Auto download
    const a = document.createElement('a');
    a.href = resultDataUrl;
    a.download = 'no_watermark.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);

    btn.disabled = false; btn.textContent = '🧹 去除水印';
  });
}

function goBack() {
  document.getElementById('canvasArea').classList.remove('result');
  document.getElementById('btnBack').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';
  document.getElementById('btnRemove').style.display = 'block';
  document.getElementById('btnUndo').style.display = '';
  document.getElementById('btnClear').style.display = '';
  document.getElementById('btnUndoR').style.display = '';
  resultDataUrl = null;
  draw();
}

function downloadResult() {
  if (!resultDataUrl) return;
  const a = document.createElement('a');
  a.href = resultDataUrl;
  a.download = 'no_watermark.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function resetAll() {
  img = null; marks = []; resultDataUrl = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('canvasArea').classList.add('empty');
  document.getElementById('canvasArea').classList.remove('result');
  document.getElementById('canvasHint').style.display = 'block';
  document.getElementById('btnRemove').style.display = 'none';
  document.getElementById('btnBack').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';
  document.getElementById('blurPanel').style.display = 'none';
  refreshMarkList();
}

const ca = document.getElementById('canvasArea');
ca.addEventListener('dragover', e => { e.preventDefault(); });
ca.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
document.addEventListener('paste', e => {
  for (let item of e.clipboardData.items) {
    if (item.type.match(/image\/(jpeg|png|webp)/)) { handleFile(item.getAsFile()); break; }
  }
});
</script>
</body>
</html>
